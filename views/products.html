<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div></div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openCreateModal()"><i class="bi bi-plus-lg"></i> Add Product</button>
    </div>

    <div class="card p-0">
        <div class="card-header bg-white border-0 py-3">
            <h5 class="mb-0 fw-bold">Product Catalog</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-custom mb-0">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Current Stock</th>
                        <th>Reorder Pt</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr><td colspan="6" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="productForm">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold" id="modalTitle">Add Title</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="productId">
                        <div class="mb-3">
                            <label class="form-label text-muted small text-uppercase">SKU</label>
                            <input type="text" class="form-control" id="sku" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small text-uppercase">Product Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small text-uppercase">Category</label>
                            <select class="form-select" id="category_id">
                                <option value="">None</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted small text-uppercase">Unit</label>
                                <input type="text" class="form-control" id="unit" value="pcs">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted small text-uppercase">Reorder Point</label>
                                <input type="number" class="form-control" id="reorder_point" value="0">
                            </div>
                        </div>
                        <div id="initialStockDiv" class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" id="stockLabel">Initial Stock</label>
                            <input type="number" class="form-control" id="initial_stock" value="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" id="locationLabel">Initial Location</label>
                            <select class="form-select" id="initial_location_id">
                                <option value="">Select Location</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3">
                            <small class="text-muted" id="stockHint">Set the starting inventory level and location.</small>
                        </div>
                    </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-danger">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-2">
                    <p class="mb-0">Are you sure you want to delete this product? This action cannot be undone.</p>
                    <div class="form-check mt-3 text-danger">
                        <input class="form-check-input" type="checkbox" id="forceDeleteCheck">
                        <label class="form-check-label" for="forceDeleteCheck">
                            <strong>Force Delete</strong> (Wipe all movement history)
                        </label>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script imports at end of body for fast load -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/products.js"></script>
</body>
</html>
