<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Reset Password</h4>
                <p class="text-muted">Recover your IMS account</p>
            </div>
            
            <div id="step1">
                <form id="reqOtpForm">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Send OTP</button>
                </form>
            </div>

            <div id="step2" class="d-none">
                <form id="resetForm">
                    <div class="mb-3">
                        <label class="form-label">OTP</label>
                        <input type="text" class="form-control" id="otp" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" id="newPassword" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mt-3">Reset Password</button>
                </form>
            </div>
            
            <div class="text-center mt-4 border-top pt-3">
                <a href="/login" class="text-decoration-none text-muted">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        let currentEmail = '';

        document.getElementById('reqOtpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            const res = await fetchApi('/api/auth/forgotpassword', {
                method: 'POST',
                body: JSON.stringify({ email })
            });

            if(res.success) {
                currentEmail = email;
                document.getElementById('step1').classList.add('d-none');
                document.getElementById('step2').classList.remove('d-none');
                showToast(`OTP Sent to ${email} (Demo: ${res.otp})`, 'info');
            } else {
                showToast(res.message || 'Failed to send OTP', 'danger');
            }
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('newPassword').value;
            
            const res = await fetchApi('/api/auth/resetpassword', {
                method: 'PUT',
                body: JSON.stringify({ email: currentEmail, otp, newPassword })
            });

            if(res.success) {
                showToast('Password reset successful! Please login.', 'success');
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                showToast(res.message || 'Reset failed', 'danger');
            }
        });
    </script>
</body>
</html>
