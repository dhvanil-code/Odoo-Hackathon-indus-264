<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    
    <div class="row mb-4">
        <div class="col-md-3 col-sm-6 animate-slide-up stagger-1">
            <div class="card">
                <div class="kpi-card">
                    <div class="kpi-icon bg-primary">
                        <i class="bi bi-box-seam"></i>
                    </div>
                    <div class="kpi-details">
                        <h3 id="t-products">0</h3>
                        <p>Total Products</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 animate-slide-up stagger-2">
            <div class="card">
                <div class="kpi-card">
                    <div class="kpi-icon bg-danger">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <div class="kpi-details">
                        <h3 id="t-lowstock">0</h3>
                        <p>Low Stock Items</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 animate-slide-up stagger-3">
            <div class="card">
                <div class="kpi-card">
                    <div class="kpi-icon bg-info">
                        <i class="bi bi-box-arrow-in-down"></i>
                    </div>
                    <div class="kpi-details">
                        <h3 id="t-receipts">0</h3>
                        <p>Pending Receipts</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 animate-slide-up stagger-4">
            <div class="card">
                <div class="kpi-card">
                    <div class="kpi-icon bg-warning">
                        <i class="bi bi-box-arrow-up"></i>
                    </div>
                    <div class="kpi-details">
                        <h3 id="t-deliveries">0</h3>
                        <p>Pending Deliveries</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card p-0">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0 fw-bold">Recent Stock Movements</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-custom mb-0">
                        <thead>
                            <tr>
                            <tr>
                                <th>Date</th>
                                <th>Reference</th>
                                <th>Type</th>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="movements-table-body">
                            <!-- Skeleton Rows -->
                            <tr>
                                <td><div class="skeleton skeleton-text"></div></td>
                                <td><div class="skeleton skeleton-text"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 50%;"></div></td>
                                <td><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text" style="width: 40%;"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 30%;"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 60%;"></div></td>
                            </tr>
                            <tr>
                                <td><div class="skeleton skeleton-text"></div></td>
                                <td><div class="skeleton skeleton-text"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 50%;"></div></td>
                                <td><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text" style="width: 40%;"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 30%;"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 60%;"></div></td>
                            </tr>
                            <tr>
                                <td><div class="skeleton skeleton-text"></div></td>
                                <td><div class="skeleton skeleton-text"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 50%;"></div></td>
                                <td><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text" style="width: 40%;"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 30%;"></div></td>
                                <td><div class="skeleton skeleton-text" style="width: 60%;"></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
