<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    
    <div class="row mt-4">
        <div class="col-md-6 mx-auto">
            <div class="card p-4 text-center">
                <div class="mb-3">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 100px; height: 100px; font-size: 2.5rem;" id="profileInitials">
                        U
                    </div>
                </div>
                <h4 class="fw-bold mb-1" id="profileName">Loading...</h4>
                <p class="text-muted mb-3" id="profileEmail">Loading...</p>
                <div class="d-inline-block px-3 py-1 bg-light rounded text-uppercase small font-weight-bold" id="profileRole">
                    Role
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            setPageTitle('My Profile');
            
            const res = await fetchApi('/api/auth/me');
            if(res.success) {
                const user = res.data;
                document.getElementById('profileName').innerText = user.name;
                document.getElementById('profileEmail').innerText = user.email;
                document.getElementById('profileRole').innerText = user.role;
                document.getElementById('profileInitials').innerText = user.name.charAt(0).toUpperCase();
            } else {
                showToast('Could not load profile info', 'danger');
            }
        });
    </script>
</body>
</html>
