<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deliveries - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div></div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#deliveryModal" onclick="openCreateModal()"><i class="bi bi-plus-lg"></i> Create Delivery Order</button>
    </div>

    <div class="card p-0">
        <div class="card-header bg-white border-0 py-3">
            <h5 class="mb-0 fw-bold">Delivery Orders (Outgoing)</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-custom mb-0">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Reference</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="deliveries-table-body">
                    <tr><td colspan="4" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="deliveryModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form id="deliveryForm">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold" id="modalTitle">Create Delivery Order</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small text-uppercase">Reference / SO</label>
                                <input type="text" class="form-control" id="reference" required>
                            </div>
                        </div>
                        
                        <h6 class="mt-4 border-bottom pb-2">Items to Deliver</h6>
                        <div id="itemsContainer">
                            <!-- Items go here -->
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="addItemRow()">+ Add Item</button>

                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Delivery</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Template for JS item row -->
    <template id="itemRowTemplate">
        <div class="row align-items-end mb-2 item-row">
            <div class="col-4">
                <label class="form-label text-muted small mb-1">Product</label>
                <select class="form-select product-select" required></select>
            </div>
            <div class="col-4">
                <label class="form-label text-muted small mb-1">Source Location</label>
                <select class="form-select location-select" required></select>
            </div>
            <div class="col-3">
                <label class="form-label text-muted small mb-1">Qty</label>
                <input type="number" class="form-control item-qty" min="1" required>
            </div>
            <div class="col-1">
                <button type="button" class="btn btn-outline-danger" onclick="this.closest('.row').remove()"><i class="bi bi-x"></i></button>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/deliveries.js"></script>
</body>
</html>
