<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card" id="authCard">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">IMS</h4>
                <p class="text-muted">Inventory Management System</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="password-field-container">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="/reset-password" class="text-decoration-none small">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted small">Don't have an account? <a href="/signup" class="text-decoration-none fw-semibold">Create one</a></p>
            </div>
        </div>
    </div>
    
    <script src="/js/utils.js"></script>
    <script>
        // Password toggle
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const authCard = document.getElementById('authCard');
            
            authCard.classList.remove('shake');
            
            const res = await fetchApi('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });

            if(res.success) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = '/dashboard';
            } else {
                authCard.classList.add('shake');
                showToast(res.message || 'Login failed', 'danger');
                
                // Clear password on failure
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
