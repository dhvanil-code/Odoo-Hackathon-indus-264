<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card" id="authCard">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Create Account</h4>
                <p class="text-muted">Join the Inventory Management System</p>
            </div>
            
            <form id="signupForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="password-field-container">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required minlength="6">
                        <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-semibold">Sign Up</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted small">Already have an account? <a href="/login" class="text-decoration-none fw-semibold">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        // Password toggle
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const authCard = document.getElementById('authCard');

            authCard.classList.remove('shake');
            
            const res = await fetchApi('/api/auth/register', {
                method: 'POST',
                body: JSON.stringify({ name, email, password })
            });

            if(res.success) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = '/dashboard';
            } else {
                authCard.classList.add('shake');
                showToast(res.message || 'Registration failed', 'danger');
            }
        });
    </script>
</body>
</html>
